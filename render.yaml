services:
  - type: web
    name: certificate-generator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --worker-class gthread --timeout 120 --access-logfile - --slow-requests 5
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
