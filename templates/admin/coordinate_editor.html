<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coordinate Editor – {{ event.name }} – Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style>
      @font-face {
        font-family: 'Montserrat Bold';
        src: url('{{ url_for("montserrat_bold_font") }}') format('truetype');
        font-weight: 700;
      }
      body {
        overflow: hidden;
      }
      .coord-editor-layout {
        display: flex;
        height: 100vh;
        background:
          radial-gradient(circle at top, rgba(97, 168, 255, 0.18), transparent 32%),
          linear-gradient(180deg, var(--bg-accent) 0%, var(--bg) 100%);
      }
      .coord-editor-canvas {
        flex: 1;
        background: rgba(7, 17, 31, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        overflow: auto;
        position: relative;
      }
      #certEditorCanvas {
        max-width: 100%;
        max-height: 100%;
        cursor: crosshair;
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.38);
        border-radius: 8px;
      }
      .coord-editor-panel {
        width: 300px;
        background: rgba(13, 24, 42, 0.96);
        border-left: 1px solid var(--border);
        padding: 1.5rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(16px);
      }
      .coord-editor-panel h3 {
        margin: 0 0 1rem;
        font-size: 1.1rem;
      }
      .coord-editor-control {
        margin-bottom: 1.25rem;
      }
      .coord-editor-control label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text);
      }
      .coord-editor-control input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.6rem;
        font-size: 0.95rem;
        background: var(--surface);
        color: var(--text);
      }
      .coord-editor-control input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .coord-editor-control input[type="color"] {
        appearance: none;
        -webkit-appearance: none;
        min-height: 44px;
        padding: 0.2rem;
        cursor: pointer;
      }
      .coord-editor-control input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      .coord-editor-control input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 6px;
      }
      .coord-editor-control input[type="color"]::-moz-color-swatch {
        border: none;
        border-radius: 6px;
      }
      .coord-editor-actions {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .coord-editor-btn {
        border: none;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .coord-editor-btn.primary {
        background: var(--accent);
        color: #fff;
      }
      .coord-editor-btn.primary:hover {
        background: var(--accent-hover);
      }
      .coord-editor-btn.secondary {
        background: #31445f;
        color: var(--text);
      }
      .coord-editor-btn.secondary:hover {
        background: #3c5474;
      }
      .coord-info {
        font-size: 0.85rem;
        color: var(--muted);
        background: rgba(16, 32, 56, 0.72);
        padding: 0.75rem;
        border-radius: 6px;
        margin-top: 1rem;
        border-left: 3px solid var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="coord-editor-layout">
      <div class="coord-editor-canvas">
        <canvas id="certEditorCanvas"></canvas>
      </div>
      <div class="coord-editor-panel">
        <h3>Text Position</h3>
        <p class="field-hint" id="coordSaveStatus">Settings autosave after changes.</p>
        <form id="editorForm" method="post" action="{{ url_for('admin_update_config', slug=event.slug) }}">
          <div class="coord-editor-control">
            <label for="text_x">X Position (px)</label>
            <input
              id="text_x" name="text_x" type="number" min="0"
              value="{{ event.text_x if event else 1789 }}"
            />
          </div>

          <div class="coord-editor-control">
            <label for="text_y">Y Position (px)</label>
            <input
              id="text_y" name="text_y" type="number" min="0"
              value="{{ event.text_y if event else 1440 }}"
            />
          </div>

          <h3 style="margin-top: 1.5rem;">Text Style</h3>

          <div class="coord-editor-control">
            <label for="font_size">Font Size (px)</label>
            <input
              id="font_size" name="font_size" type="number" min="8"
              value="{{ event.font_size if event else 100 }}"
            />
          </div>

          <div class="coord-editor-control">
            <label for="font_color">Font Color</label>
            {% if event and event.font_color %}
              {% set fc = event.font_color %}
              <input id="font_color" name="font_color" type="color"
                value="#{{ '%02x%02x%02x' % (fc[0], fc[1], fc[2]) }}"
              />
            {% else %}
              <input id="font_color" name="font_color" type="color" value="#321812" />
            {% endif %}
          </div>

          <h3 style="margin-top: 1.5rem;">Preview Text</h3>

          <div class="coord-editor-control">
            <label for="sample_text">Sample Text (for preview only)</label>
            <input
              id="sample_text" type="text"
              value="Sample Text"
              placeholder="Enter preview text..."
            />
          </div>

          <div class="coord-info">
            <strong>💡 Tip:</strong> Drag the text marker on the certificate to adjust position, or edit values directly.
          </div>

          <div class="coord-editor-actions">
            <button type="button" id="saveEditorButton" class="coord-editor-btn primary">✓ Save Changes</button>
            <a href="{{ url_for('admin_edit_event', slug=event.slug) }}" class="coord-editor-btn secondary" style="text-align: center; text-decoration: none; color: var(--text);">← Back to Event</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('certEditorCanvas');
      const ctx = canvas.getContext('2d');
      const form = document.getElementById('editorForm');

      const textXInput = document.getElementById('text_x');
      const textYInput = document.getElementById('text_y');
      const fontSizeInput = document.getElementById('font_size');
      const fontColorInput = document.getElementById('font_color');
      const sampleTextInput = document.getElementById('sample_text');
      const coordSaveStatus = document.getElementById('coordSaveStatus');
      const saveEditorButton = document.getElementById('saveEditorButton');
      const templatePreviewUrl = "{{ url_for('admin_template_preview', slug=event.slug) }}";
      const sampleTextStorageKey = 'coord-editor-sample-text:{{ event.slug }}';

      let certImage = null;
      let maxCanvasWidth = 0;
      let maxCanvasHeight = 0;
      let scaleX = 1;
      let scaleY = 1;
      let isDragging = false;
      let dragOffsetX = 0;
      let dragOffsetY = 0;
      let coordAutosaveTimer = null;
      let coordAutosaveInFlight = false;
      let coordAutosaveQueued = false;
      const fontReadyPromise = document.fonts
        ? document.fonts.load('700 32px "Montserrat Bold"').catch(() => undefined)
        : Promise.resolve();

      function setCoordSaveStatus(message, isError) {
        if (!coordSaveStatus) return;
        coordSaveStatus.textContent = message;
        coordSaveStatus.classList.toggle('warn-text', Boolean(isError));
        coordSaveStatus.classList.toggle('success-text', !isError && /saved/i.test(message));
      }

      function runCoordAutosave() {
        if (coordAutosaveInFlight) {
          coordAutosaveQueued = true;
          return Promise.resolve(false);
        }

        coordAutosaveInFlight = true;
        coordAutosaveQueued = false;
        setCoordSaveStatus('Saving changes...', false);

        return fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: {
            'X-Requested-With': 'XMLHttpRequest'
          }
        })
          .then(async (response) => {
            if (!response.ok) {
              throw new Error('Save failed');
            }
            return response.json();
          })
          .then(() => {
            setCoordSaveStatus('Settings saved automatically.', false);
            return true;
          })
          .catch(() => {
            setCoordSaveStatus('Autosave failed. Use Save Changes to retry.', true);
            return false;
          })
          .finally(() => {
            coordAutosaveInFlight = false;
            if (coordAutosaveQueued) {
              runCoordAutosave();
            }
          });
      }

      function scheduleCoordAutosave() {
        if (coordAutosaveTimer) {
          clearTimeout(coordAutosaveTimer);
        }
        setCoordSaveStatus('Unsaved changes...', false);
        coordAutosaveTimer = setTimeout(runCoordAutosave, 500);
      }

      function resizeCanvas() {
        const container = canvas.parentElement;
        maxCanvasWidth = container.clientWidth - 20;
        maxCanvasHeight = container.clientHeight - 20;
        drawPreview();
      }

      function loadCertImage() {
        const img = new Image();
        img.onload = () => {
          certImage = img;
          fontReadyPromise.finally(resizeCanvas);
        };
        img.onerror = () => {
          certImage = null;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#999';
          ctx.font = '20px "Montserrat Bold", Arial';
          ctx.textAlign = 'center';
          ctx.fillText('Preview not available', canvas.width / 2, canvas.height / 2);
        };
        img.src = `${templatePreviewUrl}?t=${Date.now()}`;
      }

      function persistSampleText() {
        try {
          sessionStorage.setItem(sampleTextStorageKey, sampleTextInput.value || '');
        } catch (error) {
        }
      }

      function restoreSampleText() {
        try {
          const storedValue = sessionStorage.getItem(sampleTextStorageKey);
          if (storedValue !== null) {
            sampleTextInput.value = storedValue;
          }
        } catch (error) {
        }
      }

      function drawPreview() {
        if (!certImage) return;

        // Calculate scaling to fit canvas while maintaining aspect ratio
        const imgAspect = certImage.width / certImage.height;
        let drawWidth = maxCanvasWidth;
        let drawHeight = drawWidth / imgAspect;

        if (drawHeight > maxCanvasHeight) {
          drawHeight = maxCanvasHeight;
          drawWidth = drawHeight * imgAspect;
        }

        scaleX = drawWidth / certImage.width;
        scaleY = drawHeight / certImage.height;

        canvas.width = drawWidth;
        canvas.height = drawHeight;

        // Draw certificate template image
        ctx.drawImage(certImage, 0, 0, drawWidth, drawHeight);

        const x = parseInt(textXInput.value) * scaleX;
        const y = parseInt(textYInput.value) * scaleY;
        const size = parseInt(fontSizeInput.value) * scaleX / 2;
        const color = fontColorInput.value || '#321812';
        const displayText = sampleTextInput.value.trim() || 'Sample Text';

        // Highlight the draggable area
        if (isDragging) {
          ctx.fillStyle = 'rgba(45, 108, 223, 0.1)';
          ctx.beginPath();
          ctx.arc(x, y, size * 1.8, 0, Math.PI * 2);
          ctx.fill();
        }

        // Crosshair circle
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.stroke();

        // Crosshair lines
        ctx.beginPath();
        ctx.moveTo(x - size * 1.5, y);
        ctx.lineTo(x + size * 1.5, y);
        ctx.moveTo(x, y - size * 1.5);
        ctx.lineTo(x, y + size * 1.5);
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.font = `bold ${Math.max(12, parseInt(fontSizeInput.value) * scaleX)}px "Montserrat Bold", Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(displayText, x, y);

      }

      // Handle canvas mousedown to start dragging
      canvas.addEventListener('mousedown', (e) => {
        if (!certImage) return;
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const textX = parseInt(textXInput.value) * scaleX;
        const textY = parseInt(textYInput.value) * scaleY;
        const size = parseInt(fontSizeInput.value) * scaleX / 2;

        // Check if click is near the text position (within 2x the text marker size)
        const distX = mouseX - textX;
        const distY = mouseY - textY;
        const distance = Math.sqrt(distX * distX + distY * distY);

        if (distance < size * 2) {
          isDragging = true;
          dragOffsetX = distX;
          dragOffsetY = distY;
          canvas.style.cursor = 'grabbing';
        }
      });

      // Handle canvas mousemove for dragging
      canvas.addEventListener('mousemove', (e) => {
        if (!isDragging || !certImage) return;

        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const newX = Math.round((mouseX - dragOffsetX) / scaleX);
        const newY = Math.round((mouseY - dragOffsetY) / scaleY);

        textXInput.value = Math.max(0, newX);
        textYInput.value = Math.max(0, newY);
        drawPreview();
      });

      // Handle canvas mouseup to stop dragging
      canvas.addEventListener('mouseup', () => {
        isDragging = false;
        canvas.style.cursor = 'crosshair';
        scheduleCoordAutosave();
      });

      canvas.addEventListener('mouseleave', () => {
        if (isDragging) {
          scheduleCoordAutosave();
        }
        isDragging = false;
        canvas.style.cursor = 'crosshair';
      });

      // Update preview when inputs change
      [textXInput, textYInput, fontSizeInput, fontColorInput, sampleTextInput].forEach(input => {
        input.addEventListener('input', drawPreview);
      });

      sampleTextInput.addEventListener('input', persistSampleText);

      if (saveEditorButton) {
        saveEditorButton.addEventListener('click', async () => {
          persistSampleText();
          saveEditorButton.disabled = true;
          const originalLabel = saveEditorButton.textContent;
          saveEditorButton.textContent = 'Saving...';
          try {
            const didSave = await runCoordAutosave();
            if (didSave) {
              saveEditorButton.textContent = 'Saved';
              window.setTimeout(() => {
                saveEditorButton.textContent = originalLabel;
              }, 900);
            } else {
              saveEditorButton.textContent = originalLabel;
            }
          } finally {
            window.setTimeout(() => {
              saveEditorButton.disabled = false;
            }, 150);
          }
        });
      }

      [textXInput, textYInput, fontSizeInput].forEach(input => {
        input.addEventListener('input', scheduleCoordAutosave);
      });
      fontColorInput.addEventListener('change', scheduleCoordAutosave);

      // Handle window resize
      window.addEventListener('resize', resizeCanvas);

      // Load template on page load
      window.addEventListener('load', () => {
        restoreSampleText();
        loadCertImage();
      });
    </script>
  </body>
</html>
