<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="page">
      <section class="card listing-card">
        <h1>Certificate Portal</h1>
        {% if events %}
        <p class="listing-intro">Select your event to download your certificate.</p>
        <ul class="event-list">
          {% for event in events %}
          <li>
            <a class="event-link" href="{{ url_for('event_page', slug=event.slug) }}">
              <span class="event-link-name">{{ event.name }}</span>
              <span class="event-arrow">→</span>
            </a>
          </li>
          {% endfor %}
        </ul>
        {% else %}
        <p class="muted-text">No events are currently available. Check back later.</p>
        {% endif %}
      </section>
    </main>
    <footer class="site-footer">Crafted with 💕 -- CSI</footer>
  </body>
</html>
