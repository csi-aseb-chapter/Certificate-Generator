<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate Preview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="page">
      <section class="card preview-card">
        {% if event %}<h1>{{ event.name }}</h1>{% else %}<h1>Certificate Preview</h1>{% endif %}
        <p class="card-subtitle">Your certificate is ready, {{ cert_name }}!</p>

        <div class="preview-frame">
          <img
            src="{{ url_for('preview_image', cert_id=cert_id) }}"
            alt="Generated certificate preview"
            class="preview-image"
          />
        </div>

        <div class="preview-actions">
          <a class="button-link" href="{{ url_for('download_file', cert_id=cert_id) }}">Download Certificate</a>
          {% if event %}
          <a class="button-link secondary" href="{{ url_for('event_page', slug=event.slug) }}">Back</a>
          {% else %}
          <a class="button-link secondary" href="{{ url_for('home') }}">Back</a>
          {% endif %}
        </div>
      </section>
    </main>
  </body>
</html>
