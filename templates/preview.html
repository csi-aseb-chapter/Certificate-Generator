<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate Preview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="page">
      <section class="card preview-card">
        <h1>Certificate Preview</h1>

        <div class="preview-frame">
          <img
            src="{{ url_for('preview_image', cert_id=cert_id, cert_name=cert_name) }}"
            alt="Generated certificate preview"
            class="preview-image"
          />
        </div>

        <div class="preview-actions">
          <a class="button-link" href="{{ url_for('download_file', cert_id=cert_id, cert_name=cert_name) }}">Download Certificate</a>
          <a class="button-link secondary" href="{{ url_for('home') }}">Back</a>
        </div>
      </section>
    </main>
  </body>
</html>
